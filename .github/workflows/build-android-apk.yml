name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Register Google sign-in deep link (kukpdf://auth)
        run: node android-ci/patch-manifest.mjs

      - name: Apply KukPDF app icon
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "android-icons/mipmap-$d/ic_launcher.png" "android/app/src/main/res/mipmap-$d/ic_launcher.png"
            cp "android-icons/mipmap-$d/ic_launcher_round.png" "android/app/src/main/res/mipmap-$d/ic_launcher_round.png"
            cp "android-icons/mipmap-$d/ic_launcher_foreground.png" "android/app/src/main/res/mipmap-$d/ic_launcher_foreground.png"
          done
          cp android-icons/ic_launcher_background.xml android/app/src/main/res/values/ic_launcher_background.xml

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KukPDF-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
