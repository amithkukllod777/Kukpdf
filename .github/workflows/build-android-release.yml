name: Build Signed Android Release

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Register Google sign-in deep link (kukpdf://auth)
        run: node android-ci/patch-manifest.mjs

      - name: Apply KukPDF app icon
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "android-icons/mipmap-$d/ic_launcher.png" "android/app/src/main/res/mipmap-$d/ic_launcher.png"
            cp "android-icons/mipmap-$d/ic_launcher_round.png" "android/app/src/main/res/mipmap-$d/ic_launcher_round.png"
            cp "android-icons/mipmap-$d/ic_launcher_foreground.png" "android/app/src/main/res/mipmap-$d/ic_launcher_foreground.png"
          done
          cp android-icons/ic_launcher_background.xml android/app/src/main/res/values/ic_launcher_background.xml

      - name: Configure release signing
        env:
          KUKPDF_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KUKPDF_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See android-ci/README.md for the one-time setup steps before running this workflow."
            exit 1
          fi
          echo "$KUKPDF_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cp android-ci/signing.gradle android/app/signing.gradle
          echo "apply from: 'signing.gradle'" >> android/app/build.gradle

      - name: Build signed release AAB
        env:
          KUKPDF_KEYSTORE_PATH: release.keystore
          KUKPDF_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KUKPDF_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KUKPDF_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: KukPDF-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
